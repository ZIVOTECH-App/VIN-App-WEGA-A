name: wega_vin_timer
description: Prosta aplikacja Flutter do sprawdzania poprawności numeru VIN.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  firebase_messaging: ^15.2.10
  excel: ^4.0.6
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  camera: ^0.11.0+2
  google_mlkit_text_recognition: ^0.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
