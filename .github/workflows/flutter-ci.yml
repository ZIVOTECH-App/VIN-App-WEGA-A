name: Flutter CI

on:
  push:
    branches:
      - main
      - wega-a-3.1-test-candidate
      - wega-a-ui-refactor
  pull_request:
    branches:
      - main

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4

      - name: Zainstaluj Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Sprawdź wersję Flutter
        run: flutter --version

      - name: Pobierz zależności
        run: flutter pub get

      - name: Analiza kodu
        run: flutter analyze

      - name: Testy
        shell: bash
        run: |
          if [ -d test ] && find test -type f -name '*_test.dart' -print -quit | grep -q .; then
            flutter test
          else
            echo 'Brak testów Flutter - pomijam krok.'
          fi

      - name: Zbuduj APK
        run: flutter build apk --debug

      - name: Zapisz APK jako artefakt
        uses: actions/upload-artifact@v4
        with:
          name: wega-a-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 14
