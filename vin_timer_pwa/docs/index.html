<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#1d4ed8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>VIN Timer</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header>
  <div><h1>VIN Timer</h1><p>Kontrola czasu pojazdów na placu</p></div>
  <button id="notifyBtn" class="ghost">Włącz powiadomienia</button>
</header>
<main>
  <section class="stats">
    <article><strong id="activeCount">0</strong><span>Aktywne</span></article>
    <article><strong id="soonCount">0</strong><span>Do 5 min</span></article>
    <article><strong id="expiredCount">0</strong><span>Po czasie</span></article>
  </section>

  <section class="panel">
    <h2>Dodaj pojazd</h2>
    <form id="addForm">
      <label>VIN
        <input id="vin" maxlength="17" autocapitalize="characters" autocomplete="off" placeholder="17 znaków VIN" required />
      </label>
      <div class="grid2">
        <label>Sektor / miejsce<input id="location" placeholder="np. A-12" /></label>
        <label>Operator<input id="operator" placeholder="Imię pracownika" /></label>
      </div>
      <label>Notatka<textarea id="note" rows="2" placeholder="Opcjonalna informacja"></textarea></label>
      <div class="actions">
        <button type="button" id="scanBtn" class="secondary">Skanuj kod VIN</button>
        <button type="submit">Uruchom 40 min</button>
      </div>
      <p id="formMessage" class="message"></p>
    </form>
  </section>

  <section class="panel">
    <div class="toolbar">
      <h2>Lista pojazdów</h2>
      <input id="search" placeholder="Szukaj VIN lub miejsca" />
      <select id="filter"><option value="all">Wszystkie</option><option value="active">Aktywne</option><option value="soon">Do 5 min</option><option value="expired">Po czasie</option></select>
    </div>
    <div id="vehicleList" class="list"></div>
  </section>

  <section class="panel">
    <div class="toolbar"><h2>Historia</h2><button id="exportBtn" class="secondary">Eksport CSV</button></div>
    <div id="historyList" class="list compact"></div>
  </section>
</main>

<dialog id="scannerDialog">
  <form method="dialog" class="scanner-head"><strong>Skanowanie kodu</strong><button>Zamknij</button></form>
  <video id="video" playsinline></video>
  <p id="scanStatus">Skieruj aparat na kod kreskowy lub QR zawierający VIN.</p>
</dialog>
<script src="app.js"></script>
</body>
</html>
